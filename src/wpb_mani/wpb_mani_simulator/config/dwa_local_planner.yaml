DWAPlannerROS:
  # 全向轮机器人必须设为 true，否则会转圈漂移
  holonomic_robot: true

  # 线速度限制
  max_vel_x: 0.4
  min_vel_x: 0.0
  max_vel_y: 0.3
  min_vel_y: -0.3

  # 整体速度上限
  max_vel_trans: 0.4
  min_vel_trans: 0.1

  # 角速度限制
  max_vel_theta: 1.0
  min_vel_theta: 0.2

  # 加速度限制
  acc_lim_x: 1.0
  acc_lim_y: 1.0
  acc_lim_theta: 1.5

  # 目标容忍度
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.1
  latch_xy_goal_tolerance: false

  # 轨迹采样
  sim_time: 2.0
  vx_samples: 10
  vy_samples: 10
  vth_samples: 20

  # 评分权重
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.02
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  # 振荡抑制
  oscillation_reset_dist: 0.05
